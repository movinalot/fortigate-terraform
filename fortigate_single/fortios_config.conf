Content-Type: multipart/mixed; boundary="==FTNTVM=="
MIME-Version: 1.0

--==FTNTVM==
Content-Type: text/plain; charset="us-ascii"
MIME-Version: 1.0
Content-Transfer-Encoding: 7bit
Content-Disposition: attachment; filename="config"

config system global
    set hostname ${host_name}
    set admintimeout 30
end

config system sdn-connector
    edit AzureSDN
        set type azure
    next
end

config vpn ssl settings
    set port 10443
end

config router static
    edit 1
        set gateway ${external_subnet_gateway}
        set device port1
    next
    edit 2
        set dst ${vnet_address_prefix}
        set gateway ${internal_subnet_gateway}
        set device port2
    next
end

config system interface
    edit port1
        set mode static
        set ip ${port1_ip} ${port1_netmask}
        set description external
        set allowaccess probe-response ping ssh https
    next
    edit port2
        set mode static
        set ip ${port2_ip} ${port2_netmask}
        set description internal
        set allowaccess probe-response ping ssh https
    next
end

config system api-user
    edit "apiadmin"
        set api-key ${api_key}
        set accprofile "super_admin"
        set vdom "root"
    next
end

config system probe-response
    set http-probe-value OK
    set mode http-probe
end

%{ if connect_to_fmg == "true" }
config system central-management
    set type fortimanager
    set fmg ${forti_manager_ip}
    set serial-number ${forti_manager_serial}
end
config system interface
    edit port1
    append allowaccess fgfm
end
config system interface
    edit port2
    append allowaccess fgfm
end
%{ endif }

